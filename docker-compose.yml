version: "3.9"

services:

  # ── Order Service (Django) ──────────────────────────────────────
  order-service:
    build: ./order-service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./order-service:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@order-db:5432/order_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=change-me-in-production
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Outbox worker runs as a separate process
  outbox-worker:
    build: ./order-service
    command: python manage.py run_outbox_worker
    volumes:
      - ./order-service:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@order-db:5432/order_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - order-service

  # Kafka consumer for Order Service
  order-consumer:
    build: ./order-service
    command: python manage.py run_consumer
    volumes:
      - ./order-service:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@order-db:5432/order_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - order-service

  # ── Payment Service (FastAPI) ───────────────────────────────────
  payment-service:
    build: ./payment-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./payment-service:/app
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@payment-db:5432/payment_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=change-me-in-production
      - PAYMENT_WEBHOOK_SECRET=whsec_test_xxx
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Kafka consumer for Payment Service
  payment-consumer:
    build: ./payment-service
    command: python -m app.kafka.consumer
    volumes:
      - ./payment-service:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@payment-db:5432/payment_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - payment-service

  # ── Databases ───────────────────────────────────────────────────
  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Kafka ───────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  order_db_data:
  payment_db_data:
